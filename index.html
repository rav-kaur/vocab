<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GRE Vocab Trainer</title>
<meta name="theme-color" content="#0f1220">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRE Vocab">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0f1220; --panel:#1a1f36; --panel2:#232a4a; --line:#333c66;
    --txt:#eef1ff; --muted:#97a0c8; --accent:#6c8cff; --accent2:#00d4a0;
    --warn:#ff6b6b; --good:#00d4a0; --gold:#ffcf5c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1220,#151a30);color:var(--txt);min-height:100vh}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(15,18,32,.92);backdrop-filter:blur(8px);z-index:50;flex-wrap:wrap}
  .logo{font-weight:800;font-size:20px;letter-spacing:.5px}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:6px;flex-wrap:wrap}
  nav button{background:transparent;border:1px solid transparent;color:var(--muted);padding:8px 14px;
    border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
  nav button:hover{color:var(--txt);background:var(--panel)}
  nav button.active{color:#fff;background:var(--accent);border-color:var(--accent)}
  .spacer{flex:1}
  .streak{font-size:13px;color:var(--muted)}
  .streak b{color:var(--gold)}
  main{max-width:1080px;margin:0 auto;padding:26px 22px 80px}
  h2{margin:0 0 4px;font-size:24px}
  .sub{color:var(--muted);margin:0 0 22px;font-size:14px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  select,input[type=number]{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    padding:9px 12px;border-radius:9px;font-size:14px;min-width:150px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;
    font-weight:700;cursor:pointer;font-size:14px;transition:.15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--txt)}
  .btn.small{padding:7px 12px;font-size:13px}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;
    background:var(--panel2);color:var(--muted)}

  /* Flashcards */
  .fc-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:10px}
  .card{width:100%;max-width:620px;min-height:360px;perspective:1600px;cursor:pointer}
  .card-inner{position:relative;width:100%;height:100%;min-height:360px;transition:transform .5s;
    transform-style:preserve-3d}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:26px;display:flex;flex-direction:column;overflow:auto}
  .face.front{align-items:center;justify-content:center;text-align:center}
  .front .word{font-size:44px;font-weight:800;letter-spacing:.5px}
  .front .hint{color:var(--muted);margin-top:14px;font-size:13px}
  .back{transform:rotateY(180deg)}
  .back .word{font-size:26px;font-weight:800;margin-bottom:2px}
  .back .setpill{margin-bottom:12px}
  .sect{margin-top:14px}
  .sect .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:800;margin-bottom:4px}
  .sect .val{font-size:15px;line-height:1.5;white-space:pre-line}
  .sect.sentence{background:var(--panel2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 12px}
  .sect.sentence .val{font-style:italic}
  .sect.sentence .val b{font-style:normal;color:var(--accent2)}
  .back img{max-width:220px;max-height:180px;border-radius:10px;margin-top:8px;align-self:flex-start}
  .synlist{display:flex;flex-wrap:wrap;gap:6px}
  .synlist span{background:var(--panel2);padding:3px 10px;border-radius:14px;font-size:13px}
  .fc-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .rate{display:flex;gap:10px}
  .rate button{padding:10px 16px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:14px}
  .rate .miss{background:#3a2140;color:var(--warn);border:1px solid var(--warn)}
  .rate .got{background:#123a30;color:var(--good);border:1px solid var(--good)}
  .counter{color:var(--muted);font-size:14px;min-width:90px;text-align:center}

  /* Match */
  .grid{display:grid;gap:10px;margin-top:18px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;
    min-height:78px;display:flex;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;font-size:14px;line-height:1.3;transition:.12s;user-select:none}
  .tile.word{font-weight:800;font-size:16px}
  .tile:hover{border-color:var(--accent)}
  .tile.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tile.wrong{background:#3a1520;border-color:var(--warn);animation:shake .3s}
  .tile.gone{visibility:hidden}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .stats{display:flex;gap:20px;margin-top:14px;color:var(--muted);font-size:14px}
  .stats b{color:var(--txt)}

  /* Quiz */
  .quiz-card{max-width:640px;margin:14px auto 0;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:26px}
  .quiz-word{font-size:36px;font-weight:800;text-align:center;margin-bottom:6px}
  .quiz-q{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);padding:14px 16px;border-radius:11px;margin-bottom:10px;cursor:pointer;font-size:15px;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:#123a30;border-color:var(--good)}
  .opt.incorrect{background:#3a1520;border-color:var(--warn)}
  .opt:disabled{cursor:default}

  /* Progress */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat-card .n{font-size:30px;font-weight:800}
  .stat-card .k{color:var(--muted);font-size:13px;margin-top:2px}
  .bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:8px}
  .bar > i{display:block;height:100%;background:var(--good)}
  table{width:100%;border-collapse:collapse;margin-top:18px;font-size:14px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .mini-bar{height:7px;width:120px;background:var(--panel2);border-radius:6px;overflow:hidden;display:inline-block;vertical-align:middle}
  .mini-bar > i{display:block;height:100%;background:var(--accent2)}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:15px}
  .checks{display:flex;flex-wrap:wrap;gap:8px;max-height:150px;overflow:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:10px}
  .checks label{display:flex;align-items:center;gap:5px;font-size:13px;background:var(--panel2);
    padding:4px 9px;border-radius:8px;cursor:pointer}
  .note{color:var(--muted);font-size:13px;margin-top:8px}

  /* ---- mobile ---- */
  @media (max-width:640px){
    header{padding:10px 14px;gap:10px}
    .logo{font-size:18px}
    nav{width:100%;order:3;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:2px}
    nav button{white-space:nowrap;padding:8px 12px;font-size:13px}
    .streak{order:2;font-size:12px}
    .spacer{display:none}
    main{padding:18px 14px 90px}
    h2{font-size:20px}
    .row{gap:8px}
    select,input[type=number]{min-width:0;width:100%;font-size:16px}
    .row label{display:flex;flex-direction:column;gap:4px;width:100%;font-size:13px;color:var(--muted)}
    .row > .btn{width:100%}
    .card,.card-inner,.face{min-height:60vh}
    .front .word{font-size:34px}
    .quiz-word{font-size:28px}
    .tile{min-height:64px;font-size:13px;padding:8px}
    .tile.word{font-size:15px}
    .rate button{flex:1}
    .rate{width:100%}
    .fc-controls{width:100%;justify-content:space-between}
    .stats{gap:12px;font-size:13px;flex-wrap:wrap}
    table{font-size:13px}
    th:nth-child(3),td:nth-child(3){display:none}
    .mini-bar{width:70px}
    .back img{max-width:70%}
  }
  @media (hover:none){ .tile{-webkit-tap-highlight-color:transparent} }
</style>
</head>
<body>
<header>
  <div class="logo">GRE<span>Vocab</span></div>
  <nav id="nav">
    <button data-mode="flash" class="active">Flashcards</button>
    <button data-mode="match">Match</button>
    <button data-mode="quiz">Quiz</button>
    <button data-mode="type">Type</button>
    <button data-mode="review">Review</button>
    <button data-mode="progress">Progress</button>
  </nav>
  <div class="spacer"></div>
  <div class="streak" id="streak"></div>
</header>
<main id="app"></main>

<script src="data.js"></script>
<script>
const VOCAB = window.VOCAB || [];
VOCAB.forEach((c,i)=>c.id=i);
const SETS = [...new Set(VOCAB.map(c=>c.set))]
  .sort((a,b)=>{const A=VOCAB.find(c=>c.set===a).setNum,B=VOCAB.find(c=>c.set===b).setNum;return A-B});

/* ---------- progress store (localStorage) ---------- */
const PKEY='gre_vocab_progress_v1';
let P = load();
function load(){try{return JSON.parse(localStorage.getItem(PKEY))||{}}catch(e){return {}}}
function save(){try{localStorage.setItem(PKEY,JSON.stringify(P))}catch(e){}}
const DAY=86400000;
const INTERVALS=[0,1,3,7,21,60]; // Leitner box -> days until due
function rec(id){ if(!P[id]) P[id]={box:0,seen:0,correct:0,wrong:0,known:false,due:0}; return P[id]; }
function grade(id,good){
  const r=rec(id); r.seen++;
  if(good){ r.correct++; r.box=Math.min(r.box+1,INTERVALS.length-1); if(r.box>=3) r.known=true; }
  else { r.wrong++; r.box=Math.max(r.box-1,0); r.known=false; }
  r.due = Date.now() + INTERVALS[r.box]*DAY;
  save(); renderStreak();
}
function isDue(id){ const r=P[id]; if(!r||!r.seen) return true; return r.due<=Date.now(); }

/* ---------- helpers ---------- */
const $=(s,el=document)=>el.querySelector(s);
const app=$('#app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
// allow only <b> <i> from our data
function rich(s){return esc(s).replace(/&lt;(\/?[bi])&gt;/g,'<$1>')}
function synChips(s){ if(!s) return '<span class="muted">—</span>';
  return '<div class="synlist">'+s.split(',').map(x=>x.trim()).filter(Boolean).map(x=>`<span>${esc(x)}</span>`).join('')+'</div>'}

function renderStreak(){
  const known=VOCAB.filter(c=>P[c.id]&&P[c.id].known).length;
  const due=VOCAB.filter(c=>P[c.id]&&P[c.id].seen&&isDue(c.id)).length;
  $('#streak').innerHTML=`<b>${known}</b> mastered · ${due} due for review`;
}

/* ================= FLASHCARDS ================= */
let fcDeck=[], fcIdx=0, fcFlipped=false;
function viewFlash(){
  app.innerHTML=`
    <h2>Flashcards</h2>
    <p class="sub">Front shows the word — click the card (or press Space) to reveal. Rate yourself to feed spaced repetition.</p>
    <div class="row">
      <label>Set:
        <select id="fcSet">
          <option value="__all">All sets (868 words)</option>
          ${SETS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
        </select></label>
      <label><input type="checkbox" id="fcShuffle" checked> Shuffle</label>
      <button class="btn small" id="fcStart">Start</button>
    </div>
    <div id="fcArea"></div>`;
  $('#fcStart').onclick=startFlash;
  startFlash();
}
function startFlash(){
  const s=$('#fcSet').value;
  fcDeck = s==='__all'?VOCAB.slice():VOCAB.filter(c=>c.set===s);
  if($('#fcShuffle').checked) fcDeck=shuffle(fcDeck);
  fcIdx=0; fcFlipped=false; drawFlash();
}
function drawFlash(){
  const area=$('#fcArea');
  if(!fcDeck.length){area.innerHTML='<div class="empty">No cards.</div>';return}
  const c=fcDeck[fcIdx];
  area.innerHTML=`
    <div class="fc-wrap">
      <div class="card ${fcFlipped?'flipped':''}" id="theCard">
        <div class="card-inner">
          <div class="face front">
            <div class="word">${esc(c.w)}</div>
            <div class="hint">click to flip · ${esc(c.set)}</div>
          </div>
          <div class="face back">
            <div class="word">${esc(c.w)}</div>
            <div class="setpill"><span class="pill">${esc(c.set)}</span></div>
            <div class="sect"><div class="lbl">Definition</div><div class="val">${rich(c.d1)}</div></div>
            ${c.img?`<img src="images/${encodeURIComponent(c.img)}" alt="" loading="lazy">`:''}
            ${c.sent?`<div class="sect sentence"><div class="lbl">In a sentence</div><div class="val">${rich(c.sent)}</div></div>`:''}
            ${c.d2?`<div class="sect"><div class="lbl">More detail</div><div class="val">${rich(c.d2)}</div></div>`:''}
            ${c.ex?`<div class="sect"><div class="lbl">Examples</div><div class="val">${rich(c.ex)}</div></div>`:''}
            <div class="sect"><div class="lbl">Synonyms</div>${synChips(c.syn)}</div>
          </div>
        </div>
      </div>
      <div class="fc-controls">
        <button class="btn ghost small" id="prev">‹ Prev</button>
        <span class="counter">${fcIdx+1} / ${fcDeck.length}</span>
        <button class="btn ghost small" id="next">Next ›</button>
      </div>
      <div class="rate">
        <button class="miss" id="miss">✗ Missed it</button>
        <button class="got" id="got">✓ Got it</button>
      </div>
    </div>`;
  $('#theCard').onclick=()=>{fcFlipped=!fcFlipped;$('#theCard').classList.toggle('flipped')};
  $('#prev').onclick=e=>{e.stopPropagation();move(-1)};
  $('#next').onclick=e=>{e.stopPropagation();move(1)};
  $('#miss').onclick=e=>{e.stopPropagation();grade(c.id,false);move(1)};
  $('#got').onclick=e=>{e.stopPropagation();grade(c.id,true);move(1)};
}
function move(d){fcIdx=(fcIdx+d+fcDeck.length)%fcDeck.length;fcFlipped=false;drawFlash()}

/* ================= MATCH ================= */
let mSel=[], mMatched=0, mMoves=0, mMistakes=0, mStart=0, mTimer=null, mPairs=0;
function viewMatch(){
  app.innerHTML=`
    <h2>Match Game</h2>
    <p class="sub">Click a word, then its matching definition. Right pairs vanish; wrong pairs flash red.</p>
    <div class="row">
      <label>Source:
        <select id="mSrc">
          <option value="one">One set</option>
          <option value="multi">Multiple sets</option>
          <option value="random">Random from all 868</option>
        </select></label>
      <span id="mSrcOpt"></span>
      <label>Pairs: <input type="number" id="mPairs" value="8" min="4" max="16"></label>
      <button class="btn small" id="mStart">Start</button>
    </div>
    <div id="mArea"></div>`;
  $('#mSrc').onchange=drawSrcOpt; $('#mStart').onclick=startMatch; drawSrcOpt();
}
function drawSrcOpt(){
  const v=$('#mSrc').value, el=$('#mSrcOpt');
  if(v==='one'){
    el.innerHTML=`<select id="mSet">${SETS.map(s=>`<option>${esc(s)}</option>`).join('')}</select>`;
  }else if(v==='multi'){
    el.innerHTML=`<div class="checks" id="mChecks">${SETS.map(s=>`<label><input type="checkbox" value="${esc(s)}"> ${esc(s)}</label>`).join('')}</div>`;
  }else{ el.innerHTML='<span class="note">Words picked at random from the entire 868-word pool.</span>'; }
}
function matchPool(){
  const v=$('#mSrc').value;
  if(v==='one') return VOCAB.filter(c=>c.set===$('#mSet').value);
  if(v==='multi'){const sel=[...document.querySelectorAll('#mChecks input:checked')].map(i=>i.value);
    return VOCAB.filter(c=>sel.includes(c.set));}
  return VOCAB.slice();
}
function startMatch(){
  let pool=matchPool();
  if(!pool.length){$('#mArea').innerHTML='<div class="empty">Pick at least one set.</div>';return}
  let n=Math.max(4,Math.min(16,parseInt($('#mPairs').value)||8));
  n=Math.min(n,pool.length);
  const chosen=shuffle(pool).slice(0,n);
  mPairs=n; mMatched=0; mMoves=0; mMistakes=0; mSel=[];
  const tiles=[];
  chosen.forEach(c=>{
    tiles.push({id:c.id,type:'w',text:c.w});
    tiles.push({id:c.id,type:'d',text:c.d1});
  });
  const T=shuffle(tiles);
  const cols = window.innerWidth<640 ? 2 : Math.min(4,Math.ceil(Math.sqrt(T.length)));
  $('#mArea').innerHTML=`
    <div class="stats">
      <div>Pairs: <b id="mDone">0</b>/${n}</div>
      <div>Moves: <b id="mMv">0</b></div>
      <div>Misses: <b id="mMs">0</b></div>
      <div>Time: <b id="mTime">0:00</b></div>
    </div>
    <div class="grid" id="mGrid" style="grid-template-columns:repeat(${cols},1fr)">
      ${T.map((t,i)=>`<div class="tile ${t.type==='w'?'word':''}" data-i="${i}" data-id="${t.id}" data-type="${t.type}">${t.type==='w'?esc(t.text):rich(t.text)}</div>`).join('')}
    </div>`;
  document.querySelectorAll('#mGrid .tile').forEach(t=>t.onclick=()=>clickTile(t));
  mStart=Date.now(); clearInterval(mTimer);
  mTimer=setInterval(()=>{const s=(Date.now()-mStart)/1000|0;$('#mTime').textContent=`${s/60|0}:${String(s%60).padStart(2,'0')}`},500);
}
function clickTile(t){
  if(t.classList.contains('gone')||t.classList.contains('sel')||mSel.length>=2)return;
  t.classList.add('sel'); mSel.push(t);
  if(mSel.length===2){
    mMoves++; $('#mMv').textContent=mMoves;
    const [a,b]=mSel;
    if(a.dataset.id===b.dataset.id && a.dataset.type!==b.dataset.type){
      setTimeout(()=>{a.classList.add('gone');b.classList.add('gone');
        mMatched++; $('#mDone').textContent=mMatched;
        grade(+a.dataset.id,true);
        mSel=[]; if(mMatched===mPairs) finishMatch();},250);
    }else{
      a.classList.add('wrong'); b.classList.add('wrong');
      grade(+a.dataset.id,false); grade(+b.dataset.id,false);
      mMistakes++; $('#mMs').textContent=mMistakes;
      setTimeout(()=>{a.classList.remove('wrong','sel');b.classList.remove('wrong','sel');mSel=[]},650);
    }
  }
}
function finishMatch(){
  clearInterval(mTimer);
  const s=(Date.now()-mStart)/1000|0;
  $('#mArea').insertAdjacentHTML('beforeend',
    `<div class="quiz-card" style="text-align:center;margin-top:20px">
      <div style="font-size:22px;font-weight:800">🎉 Cleared in ${s/60|0}:${String(s%60).padStart(2,'0')}</div>
      <p class="sub" style="margin:8px 0 16px">${mMoves} moves · ${mMistakes} misses</p>
      <button class="btn" onclick="startMatch()">Play again</button>
    </div>`);
}

/* ================= QUIZ ================= */
let qDeck=[], qIdx=0, qScore=0, qAnswered=false;
function viewQuiz(){
  app.innerHTML=`
    <h2>Multiple-Choice Quiz</h2>
    <p class="sub">Pick the correct definition for each word. Answers feed your progress + spaced repetition.</p>
    <div class="row">
      <label>Set:
        <select id="qSet">
          <option value="__all">All sets</option>
          <option value="__due">Due for review</option>
          ${SETS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
        </select></label>
      <label>Questions: <input type="number" id="qN" value="15" min="5" max="50"></label>
      <button class="btn small" id="qStart">Start</button>
    </div>
    <div id="qArea"></div>`;
  $('#qStart').onclick=startQuiz;
}
function startQuiz(){
  const s=$('#qSet').value;
  let pool = s==='__all'?VOCAB.slice()
    : s==='__due'?VOCAB.filter(c=>isDue(c.id))
    : VOCAB.filter(c=>c.set===s);
  if(!pool.length){$('#qArea').innerHTML='<div class="empty">Nothing here — try another set.</div>';return}
  const n=Math.min(Math.max(5,parseInt($('#qN').value)||15),pool.length);
  qDeck=shuffle(pool).slice(0,n); qIdx=0; qScore=0; drawQuiz();
}
function drawQuiz(){
  if(qIdx>=qDeck.length){
    $('#qArea').innerHTML=`<div class="quiz-card" style="text-align:center">
      <div style="font-size:26px;font-weight:800">Score: ${qScore} / ${qDeck.length}</div>
      <p class="sub" style="margin:10px 0 16px">${Math.round(qScore/qDeck.length*100)}%</p>
      <button class="btn" onclick="startQuiz()">Again</button></div>`;
    return;
  }
  qAnswered=false;
  const c=qDeck[qIdx];
  const distract=shuffle(VOCAB.filter(x=>x.id!==c.id&&x.d1)).slice(0,3);
  const opts=shuffle([c,...distract]);
  $('#qArea').innerHTML=`
    <div class="quiz-card">
      <div class="quiz-q">Question ${qIdx+1} of ${qDeck.length} · Score ${qScore}</div>
      <div class="quiz-word">${esc(c.w)}</div>
      <div class="quiz-q">Which definition fits?</div>
      <div id="opts">${opts.map(o=>`<button class="opt" data-id="${o.id}">${rich(o.d1)}</button>`).join('')}</div>
    </div>`;
  document.querySelectorAll('#opts .opt').forEach(b=>b.onclick=()=>answerQuiz(b,c));
}
function answerQuiz(btn,c){
  if(qAnswered)return; qAnswered=true;
  const good = +btn.dataset.id===c.id;
  document.querySelectorAll('#opts .opt').forEach(b=>{
    b.disabled=true;
    if(+b.dataset.id===c.id) b.classList.add('correct');
    else if(b===btn) b.classList.add('incorrect');
  });
  if(good) qScore++;
  grade(c.id,good);
  setTimeout(()=>{qIdx++;drawQuiz()},good?700:1300);
}

/* ================= TYPE (active recall) ================= */
let tDeck=[], tIdx=0, tScore=0, tState='ask';
function lev(a,b){ // Levenshtein distance
  a=a.toLowerCase();b=b.toLowerCase();
  const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function viewType(){
  app.innerHTML=`
    <h2>Type It Out</h2>
    <p class="sub">Read the definition, type the word. Near-misspellings still count — you'll see the correct spelling. Strongest mode for active recall.</p>
    <div class="row">
      <label>Set:
        <select id="tSet">
          <option value="__all">All sets</option>
          <option value="__due">Due for review</option>
          ${SETS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
        </select></label>
      <label>Words: <input type="number" id="tN" value="15" min="5" max="50"></label>
      <button class="btn small" id="tStart">Start</button>
    </div>
    <div id="tArea"></div>`;
  $('#tStart').onclick=startType;
}
function startType(){
  const s=$('#tSet').value;
  let pool = s==='__all'?VOCAB.slice()
    : s==='__due'?VOCAB.filter(c=>isDue(c.id))
    : VOCAB.filter(c=>c.set===s);
  if(!pool.length){$('#tArea').innerHTML='<div class="empty">Nothing here — try another set.</div>';return}
  const n=Math.min(Math.max(5,parseInt($('#tN').value)||15),pool.length);
  tDeck=shuffle(pool).slice(0,n); tIdx=0; tScore=0; drawType();
}
function drawType(){
  if(tIdx>=tDeck.length){
    $('#tArea').innerHTML=`<div class="quiz-card" style="text-align:center">
      <div style="font-size:26px;font-weight:800">Score: ${tScore} / ${tDeck.length}</div>
      <p class="sub" style="margin:10px 0 16px">${Math.round(tScore/tDeck.length*100)}%</p>
      <button class="btn" onclick="startType()">Again</button></div>`;
    return;
  }
  tState='ask';
  const c=tDeck[tIdx];
  $('#tArea').innerHTML=`
    <div class="quiz-card">
      <div class="quiz-q">Word ${tIdx+1} of ${tDeck.length} · Score ${tScore}</div>
      <div class="sect"><div class="lbl">Definition</div><div class="val" style="font-size:18px">${rich(c.d1)}</div></div>
      ${c.syn?`<div class="sect"><div class="lbl">Synonyms (hint)</div>${synChips(c.syn)}</div>`:''}
      <div id="tPicWrap" class="sect"></div>
      <input type="text" id="tInput" placeholder="Type the word…" autocomplete="off" autocorrect="off" spellcheck="false"
        style="width:100%;font-size:17px;padding:12px 14px;margin-top:16px">
      <div class="row" style="margin-top:12px">
        ${c.img?`<button class="btn ghost small" id="tPic">Show picture hint</button>`:''}
        <button class="btn ghost small" id="tReveal">Reveal answer</button>
        <div class="spacer"></div>
        <button class="btn small" id="tCheck">Check ›</button>
      </div>
      <div id="tFeedback" style="margin-top:16px"></div>
    </div>`;
  const input=$('#tInput'); input.focus();
  $('#tCheck').onclick=()=>checkType(c);
  input.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); tState==='ask'?checkType(c):nextType(); } };
  const rev=$('#tReveal'); if(rev) rev.onclick=()=>revealType(c);
  const pic=$('#tPic'); if(pic) pic.onclick=()=>{ $('#tPicWrap').innerHTML=`<img src="images/${encodeURIComponent(c.img)}" alt="" style="max-width:200px;max-height:160px;border-radius:10px">`; pic.remove(); };
}
function diffHtml(typed,answer){ // highlight where they differ (simple char-by-char)
  let out='';
  for(let i=0;i<answer.length;i++){
    const ch=answer[i];
    const ok = typed[i] && typed[i].toLowerCase()===ch.toLowerCase();
    out += ok?esc(ch):`<span style="background:#3a1520;color:var(--warn);border-radius:3px">${esc(ch)}</span>`;
  }
  return out;
}
function endType(c,verdict,html){
  tState='done';
  $('#tInput').disabled=true;
  const ck=$('#tCheck'); if(ck){ck.textContent='Next ›';ck.onclick=nextType;}
  const rev=$('#tReveal'); if(rev) rev.remove();
  const pic=$('#tPic'); if(pic) pic.remove();
  $('#tFeedback').innerHTML=html;
}
function checkType(c){
  if(tState!=='ask')return;
  const typed=$('#tInput').value.trim();
  if(!typed){ $('#tInput').focus(); return; }
  const answer=c.w;
  const d=lev(typed,answer);
  const thresh=Math.max(2,Math.floor(answer.length*0.25));
  if(d===0){
    tScore++; grade(c.id,true);
    endType(c,'exact',`<div style="color:var(--good);font-weight:700;font-size:16px">✓ Correct — <b>${esc(answer)}</b></div>`);
  }else if(d<=thresh){
    tScore++; grade(c.id,true);
    endType(c,'close',`<div style="color:var(--gold);font-weight:700;font-size:16px">✓ Close enough — correct spelling: <b>${esc(answer)}</b></div>
      <div class="note">You typed “${esc(typed)}”. Correct: ${diffHtml(typed,answer)}</div>`);
  }else{
    grade(c.id,false);
    endType(c,'wrong',`<div style="color:var(--warn);font-weight:700;font-size:16px">✗ Not quite — the word was <b>${esc(answer)}</b></div>
      <div class="note">You typed “${esc(typed)}”.</div>`);
  }
}
function revealType(c){
  if(tState!=='ask')return;
  grade(c.id,false);
  endType(c,'revealed',`<div style="color:var(--muted);font-weight:700;font-size:16px">The word was <b style="color:var(--txt)">${esc(c.w)}</b></div>`);
}
function nextType(){ tIdx++; drawType(); }

/* ================= REVIEW (spaced repetition) ================= */
function viewReview(){
  const due=shuffle(VOCAB.filter(c=>isDue(c.id) && (P[c.id]&&P[c.id].seen)));
  const fresh=VOCAB.filter(c=>!P[c.id]||!P[c.id].seen).length;
  if(!due.length){
    app.innerHTML=`<h2>Review</h2>
      <div class="empty">Nothing due right now. ✅<br><br>
      ${fresh} words are still new — study them in Flashcards or Quiz to add them to your review schedule.</div>`;
    return;
  }
  fcDeck=due; fcIdx=0; fcFlipped=false;
  app.innerHTML=`<h2>Review — ${due.length} due</h2>
    <p class="sub">Spaced repetition: words you miss come back sooner, words you know get pushed further out.</p>
    <div id="fcArea"></div>`;
  drawFlash();
}

/* ================= PROGRESS ================= */
function viewProgress(){
  const seen=VOCAB.filter(c=>P[c.id]&&P[c.id].seen).length;
  const mastered=VOCAB.filter(c=>P[c.id]&&P[c.id].known).length;
  const learning=seen-mastered;
  const due=VOCAB.filter(c=>P[c.id]&&P[c.id].seen&&isDue(c.id)).length;
  const rows=SETS.map(s=>{
    const cs=VOCAB.filter(c=>c.set===s);
    const m=cs.filter(c=>P[c.id]&&P[c.id].known).length;
    const sn=cs.filter(c=>P[c.id]&&P[c.id].seen).length;
    return {s,tot:cs.length,m,sn,pct:Math.round(m/cs.length*100)};
  });
  app.innerHTML=`
    <h2>Progress</h2>
    <p class="sub">Saved automatically in this browser. Ratings from Flashcards, Quiz, Match and Review all count.</p>
    <div class="cards-grid">
      <div class="stat-card"><div class="n">${VOCAB.length}</div><div class="k">Total words</div></div>
      <div class="stat-card"><div class="n" style="color:var(--good)">${mastered}</div><div class="k">Mastered</div>
        <div class="bar"><i style="width:${mastered/VOCAB.length*100}%"></i></div></div>
      <div class="stat-card"><div class="n" style="color:var(--gold)">${learning}</div><div class="k">Still learning</div></div>
      <div class="stat-card"><div class="n" style="color:var(--accent)">${due}</div><div class="k">Due for review</div></div>
    </div>
    <table>
      <thead><tr><th>Set</th><th>Mastered</th><th>Seen</th><th>Progress</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${esc(r.s)}</td>
        <td>${r.m} / ${r.tot}</td>
        <td>${r.sn}</td>
        <td><span class="mini-bar"><i style="width:${r.pct}%"></i></span> ${r.pct}%</td>
      </tr>`).join('')}</tbody>
    </table>
    <div class="row" style="margin-top:20px">
      <button class="btn ghost small" id="resetP">Reset all progress</button>
    </div>`;
  $('#resetP').onclick=()=>{if(confirm('Erase all saved progress? This cannot be undone.')){P={};save();renderStreak();viewProgress()}};
}

/* ================= ROUTER ================= */
const VIEWS={flash:viewFlash,match:viewMatch,quiz:viewQuiz,type:viewType,review:viewReview,progress:viewProgress};
function go(mode){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  VIEWS[mode]();
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.mode));
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){const c=$('#theCard'); if(c){e.preventDefault();fcFlipped=!fcFlipped;c.classList.toggle('flipped')}}
  if(e.key==='ArrowRight'&&$('#next'))move(1);
  if(e.key==='ArrowLeft'&&$('#prev'))move(-1);
});
renderStreak();
go('flash');

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
